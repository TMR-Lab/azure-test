<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIチャット</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", sans-serif;
            margin: 0;
            background-color: #f0f4f8;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 100%;
            max-width: 720px;
            height: 90vh;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: #0078d4;
            color: white;
            padding: 16px 20px;
            font-size: 18px;
            font-weight: 600;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fafbfc;
        }
        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .message.user {
            align-self: flex-end;
            background: #0078d4;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.assistant {
            align-self: flex-start;
            background: #e9ecef;
            color: #222;
            border-bottom-left-radius: 4px;
        }
        .message.error {
            align-self: center;
            background: #fde7e9;
            color: #b3261e;
            font-size: 13px;
        }
        .chat-input-area {
            border-top: 1px solid #e1e4e8;
            padding: 12px;
            display: flex;
            gap: 8px;
            background: white;
        }
        #user-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #d0d7de;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            outline: none;
            max-height: 120px;
        }
        #user-input:focus {
            border-color: #0078d4;
        }
        #send-btn {
            padding: 0 20px;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        #send-btn:hover:not(:disabled) {
            background: #006cbe;
        }
        #send-btn:disabled {
            background: #b8b8b8;
            cursor: not-allowed;
        }
        .typing {
            font-style: italic;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">AIチャット</div>
        <div id="chat-messages" class="chat-messages"></div>
        <div class="chat-input-area">
            <textarea id="user-input" rows="1" placeholder="メッセージを入力してください（Enterで送信、Shift+Enterで改行）"></textarea>
            <button id="send-btn">送信</button>
        </div>
    </div>

    <script>
        const messagesEl = document.getElementById('chat-messages');
        const inputEl = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        const history = [];

        function appendMessage(role, content, extraClass) {
            const div = document.createElement('div');
            div.className = 'message ' + role + (extraClass ? ' ' + extraClass : '');
            div.textContent = content;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return div;
        }

        async function sendMessage() {
            const text = inputEl.value.trim();
            if (!text) return;

            appendMessage('user', text);
            history.push({ role: 'user', content: text });

            inputEl.value = '';
            inputEl.style.height = 'auto';
            sendBtn.disabled = true;

            const typingEl = appendMessage('assistant', '入力中...', 'typing');

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: history })
                });

                if (!res.ok) {
                    const errText = await res.text();
                    throw new Error('API エラー: ' + res.status + ' ' + errText);
                }

                const data = await res.json();
                const reply = data.reply || '(応答なし)';

                typingEl.classList.remove('typing');
                typingEl.textContent = reply;
                history.push({ role: 'assistant', content: reply });
            } catch (e) {
                typingEl.remove();
                appendMessage('error', 'エラー: ' + e.message, 'error');
            } finally {
                sendBtn.disabled = false;
                inputEl.focus();
            }
        }

        sendBtn.addEventListener('click', sendMessage);

        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
                e.preventDefault();
                sendMessage();
            }
        });

        inputEl.addEventListener('input', () => {
            inputEl.style.height = 'auto';
            inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
        });

        inputEl.focus();
    </script>
</body>
</html>
